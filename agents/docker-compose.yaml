version: "3.8"
services:
  weapon:
    build: ../../agents
    command: python -m src.agents.weapon_agent
    environment:
      WEAPON_AGENT_SEED: weapon-seed-1
      WEAPON_AGENT_PORT: 8101
    ports:
      - "8101:8101"
    restart: unless-stopped

  robbery:
    build: ../../agents
    command: python -m src.agents.robbery_agent
    environment:
      ROBBERY_AGENT_SEED: robbery-seed-1
      ROBBERY_AGENT_PORT: 8102
    ports:
      - "8102:8102"
    restart: unless-stopped

  face:
    build: ../../agents
    command: python -m src.agents.face_agent
    environment:
      FACE_AGENT_SEED: face-seed-1
      FACE_AGENT_PORT: 8103
    ports:
      - "8103:8103"
    restart: unless-stopped

  transcript:
    build: ../../agents
    command: python -m src.agents.transcript_agent
    environment:
      TRANSCRIPT_AGENT_SEED: transcript-seed-1
      TRANSCRIPT_AGENT_PORT: 8104
      ASR_ENDPOINT: ""        # set if you have one
    ports:
      - "8104:8104"
    restart: unless-stopped

  voice:
    build: ../../agents
    command: python -m src.agents.voice_agent
    environment:
      VOICE_AGENT_SEED: voice-seed-1
      VOICE_AGENT_PORT: 8105
      VOICE_TTS_ENDPOINT: ""  # set if you have one
    ports:
      - "8105:8105"
    restart: unless-stopped

  video:
    build: ../../agents
    command: python -m src.agents.video_process_agent
    environment:
      VIDEO_AGENT_SEED: video-seed-1
      VIDEO_AGENT_PORT: 8009
    ports:
      - "8009:8009"
    restart: unless-stopped

  timestamp:
    build: ../../agents
    command: python -m src.agents.timestamp_agent
    environment:
      TS_AGENT_SEED: ts-seed-1
      TS_AGENT_PORT: 8107
    ports:
      - "8107:8107"
    restart: unless-stopped

  search:
    build: ../../agents
    command: python -m src.agents.search_agent
    environment:
      SEARCH_AGENT_SEED: search-seed-1
      SEARCH_AGENT_PORT: 8201
    ports:
      - "8201:8201"
    restart: unless-stopped

  timeline:
    build: ../../agents
    command: python -m src.agents.timeline_ingest
    environment:
      TIMELINE_AGENT_SEED: timeline-seed-1
      TIMELINE_AGENT_PORT: 8203
    ports:
      - "8203:8203"
    restart: unless-stopped
